<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K8s Environment Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 8px solid #326ce5;
            max-width: 400px;
        }
        h1 { color: #326ce5; margin-bottom: 1rem; font-size: 1.8rem; }
        .label { color: #888; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px; margin-bottom: 5px; }
        .name-display {
            font-size: 1.5rem;
            color: #1a1a1a;
            font-weight: bold;
            margin-bottom: 1.5rem;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            background: #e6fffa;
            color: #2c7a7b;
            border: 1px solid #b2f5ea;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Kubernetes Lab</h1>
        
        <div class="label">Current Student</div>
        <div class="name-display">
            $STUDENT_NAME
        </div>

        <div class="status-badge">
            Status: 3 Replicas Healthy
        </div>

        <p style="margin-top: 25px; font-size: 0.75rem; color: #aaa;">
            Infrastructure: KIND Cluster (Local)<br>
            Server: Nginx Alpine
        </p>
    </div>
</body>
</html>
